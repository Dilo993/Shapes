<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shapes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="controls">
        <button id="btnSelectShape" style="background-color: #6c757d;">Wybierz znak</button>
        
        <button id="btnWithTemplate" class="mode-btn active">Z podglądem</button>
        <button id="btnWithoutTemplate" class="mode-btn">Z pamięci</button>
        <button id="btnClear" style="background-color: #dc3545;">Wyczyść</button>
        <button id="btnCheck" style="background-color: #28a745;">Sprawdź wynik</button>
    </div>

    <div class="canvas-container">
        <canvas id="bgCanvas" width="400" height="400"></canvas>
        <canvas id="drawCanvas" width="400" height="400"></canvas>
    </div>

    <div class="time-selector" style="margin: 15px 0;">
        <span class="time-span">Czas: </span>
        <button id="btnTime6" class="time-btn active">6s</button>
        <button id="btnTime12" class="time-btn">12s</button>
        <button id="btnTime18" class="time-btn">18s</button>
        <button id="btnTimeInf" class="time-btn">Bez limitu</button>
    </div>

    <div id="result">Wybierz opcje i kliknij START, aby zacząć!</div>

    <div id="shapeModal" class="modal">
        <div class="modal-content" style="max-width: 600px;"> <span class="modal-close">&times;</span>
            <h2>Wybierz znaki do nałożenia</h2>
            <div id="modalCategoriesContainer" style="margin-top: 20px; max-height: 400px; overflow-y: auto; padding-right: 5px;"></div>
            <button id="btnApplyShapes" style="background-color: #3b6e4c; margin-top: 15px; width: 100%;">Zatwierdź wybór</button>
        </div>
    </div>

    <script type="module" src="script.js" defer></script>
</body>
</html>
